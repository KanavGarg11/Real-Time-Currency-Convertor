<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning API</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    
    <div class = "navbar">
        Currency Check
    </div>

    <div class = "curr_frame_1 curr_frame" >
        <div class = "curr_box_1 curr_box">

            <div class = "box_1_row_1 row_1">

                <img class = "flag_1 flag" src="https://flagcdn.com/w160/us.png">

                <div class = "amount_frame_1 amount_frame">

                    <div class = "symbol_1 symbol">$</div>
                    <input type = "number" id = "amount_1" value = "0" placeholder = "Enter Amount To Convert (Eg: 100)">

                </div>
            </div>

            <div class="box_1_row_2 row_2">

                <select id="country_dropdown_1">
                </select>

                <div class = "currency_name_1 currency_name">
                    Indian Rupee
                </div>

            </div>

        </div>
    </div>

    <div class = "exchange_icon">
    </div>

    <div class = "curr_frame_2 curr_frame" >
        <div class = "curr_box_2 curr_box">

            <div class = "box_2_row_1 row_1">

                <img class = "flag_2 flag" src="https://flagcdn.com/w160/in.png">

                <div class = "amount_frame_2 amount_frame">

                    <div class = "symbol_2 symbol">$</div>
                    <input type = "number" id = "amount_2" value = "0" placeholder = "Enter Amount To Convert (Eg: 100)">

                </div>
            </div>

            <div class="box_2_row_2 row_2">

                <select id="country_dropdown_2">
                </select>

                <div class = "currency_name_2 currency_name">
                    Indian Rupee
                </div>

            </div>

        </div>
    </div>

    <script src = "codes.js"></script>
    <script src = "script.js"></script>
</body>
</html>
